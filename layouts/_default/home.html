{{ define "main" }}
  <div class="home-content" style="text-align: center; margin-bottom: 2rem;">
    {{/* content/_index.md の本文を表示 */}}
    {{ .Content }}
  </div>

  <section class="galleries">
    {{/* gallery 以下のアルバムを表示 */}}
    {{ $galleries := where site.RegularPages "Section" "gallery" }}
    {{ range where $galleries "Params.private" "ne" true }}
      {{ partial "album-card.html" . }}
    {{ end }}
  </section>
{{ end }}
