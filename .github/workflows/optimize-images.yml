name: Optimize images

permissions:
  contents: write

on:
  push:
    paths:
      - 'content/gallery/**'
      - 'static/images/**'
      - 'assets/images/**'
      - 'tools/optimize_images.py'
  pull_request:
    paths:
      - 'content/gallery/**'
      - 'static/images/**'
      - 'assets/images/**'
      - 'tools/optimize_images.py'

jobs:
  optimize:
    name: Optimize images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: Run image optimizer
        run: |
          # Adjust arguments as needed: --max-width/--quality/--recursive
          python tools/optimize_images.py content/gallery/landscapes --max-width 2048 --quality 85 --recursive

      - name: Create Pull Request with optimized images
        uses: peter-evans/create-pull-request@v4
        with:
          # token defaults to GITHUB_TOKEN; explicit is fine
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: optimize images (automated)"
          branch: "optimize/images-${{ github.run_id }}"
          title: "chore: optimize images (automated)"
          body: "Automated image optimization results."
          labels: automated
