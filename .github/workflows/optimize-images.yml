name: Optimize images

on:
  push:
    paths:
      - 'content/gallery/**'
      - 'static/images/**'
      - 'assets/images/**'
      - 'tools/optimize_images.py'
  pull_request:
    paths:
      - 'content/gallery/**'
      - 'static/images/**'
      - 'assets/images/**'
      - 'tools/optimize_images.py'

jobs:
  optimize:
    name: Optimize images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: Run image optimizer
        run: |
          # Adjust arguments as needed: --max-width/--quality/--recursive
          python tools/optimize_images.py content/gallery/landscapes --max-width 2048 --quality 85 --recursive

      - name: Commit optimized images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: optimize images (automated) [skip ci]"
            git push
          fi
